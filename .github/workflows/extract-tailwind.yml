name: Extract Tailwind CSS from CDN - ESOL

on:
  push:
    paths:
      - 'docs/**/*.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-tailwind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --save-dev tailwindcss@^3 postcss autoprefixer

      - name: Extract used Tailwind classes from all HTML files
        run: node .github/scripts/extract-tailwind.js

      - name: Commit extracted CSS
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add assets/tailwind.css
          git pull --rebase origin main
          git add assets/tailwind.css
          git diff --staged --quiet || git commit -m "chore: update extracted tailwind.css [skip ci]"
          git push
